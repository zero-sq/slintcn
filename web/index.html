<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>slintcn — copy-paste Slint components</title>
    <meta name="description" content="Copy-paste Slint components that don't look like 2009 desktop widgets. Live interactive showcase built with Slint compiled to WebAssembly.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23fafafa%22&gt;&lt;circle cx=%2212%22 cy=%2212%22 r=%229%22 fill=%22%23171717%22 stroke=%22%23fafafa%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;">
    <style>
        :root { color-scheme: dark; }
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #0a0a0a;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
        }
        /* Slint's winit backend renders into the canvas with id="canvas". */
        canvas {
            outline: none;
            display: block;
            margin: 0 auto;
        }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #0a0a0a;
            transition: opacity 200ms ease;
            z-index: 10;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #262626;
            border-top-color: #fafafa;
            border-radius: 50%;
            animation: spin 700ms linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .label { color: #a1a1a1; font-size: 13px; font-weight: 500; }
        .brand { color: #fafafa; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
        .err   { color: #ff6467; font-size: 12px; max-width: 520px; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>
    <!-- Slint's winit backend (wasm) renders into the canvas with this id. -->
    <canvas id="canvas"></canvas>

    <div id="loader">
        <div class="brand">slintcn</div>
        <div class="spinner"></div>
        <div class="label">Compiling Slint WebAssembly bundle (~7 MB)…</div>
    </div>

    <script type="module">
        // Cache-bust: bump ?v= on each deploy so browsers fetch the fresh
        // bundle without a manual hard-refresh. The JS import query busts the
        // glue; the explicit wasm URL below busts the 7 MB binary.
        import init from './pkg/slintcn-showcase.js?v=0.14.0';

        function reveal() {
            document.getElementById('loader').classList.add('hidden');
        }

        function isWinitControlFlow(err) {
            // winit hands control to the browser from EventLoop::run() by
            // THROWING a JS exception that unwinds the Rust stack. It's not a
            // failure — the app is already running behind it. The message is
            // winit's own: "Using exceptions for control flow…".
            const msg = (err && (err.message || err.toString())) || '';
            return msg.includes('control flow') || msg.includes("isn't actually an error");
        }

        init({ module_or_path: './pkg/slintcn-showcase_bg.wasm?v=0.14.0' })
            .then(reveal)
            .catch((err) => {
                if (isWinitControlFlow(err)) {
                    // Expected. The Slint canvas is live; just show it.
                    reveal();
                    return;
                }
                const loader = document.getElementById('loader');
                loader.innerHTML = `
                    <div class="brand">slintcn</div>
                    <div class="err">Failed to load WebAssembly bundle.\n${(err && err.stack) || err}</div>
                `;
                console.error('slintcn init failed:', err);
            });
    </script>
</body>
</html>
