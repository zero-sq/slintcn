<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>slintcn — live demo</title>
    <meta name="description" content="Live interactive showcase of slintcn — copy-paste Slint components, compiled to WebAssembly.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23fafafa%22&gt;&lt;circle cx=%2212%22 cy=%2212%22 r=%229%22 fill=%22%23171717%22 stroke=%22%23fafafa%22 stroke-width=%221.5%22/&gt;&lt;/svg&gt;">
    <style>
        :root { color-scheme: dark; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
        }
        /* The showcase fills the window like a maximized desktop app (no
           letterbox bars, no clipped content). Slint watches the canvas box via
           ResizeObserver and reallocates its WebGL surface when the box changes
           — continuous change is what flickered on Safari/Firefox — so the box
           size is set in px by JS and only updated 200ms after a resize settles
           (debounced). The 100vw/vh here is just the pre-JS fallback. */
        #frame { width: 100vw; height: 100vh; }
        canvas { outline: none; display: block; width: 100% !important; height: 100% !important; }
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #0a0a0a;
            transition: opacity 200ms ease;
            z-index: 10;
        }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 32px; height: 32px;
            border: 2px solid #262626; border-top-color: #fafafa;
            border-radius: 50%; animation: spin 700ms linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .label { color: #a1a1a1; font-size: 13px; font-weight: 500; }
        .brand { color: #fafafa; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
        .err   { color: #ff6467; font-size: 12px; max-width: 520px; text-align: center; white-space: pre-wrap; }
        #home-link {
            position: fixed; top: 12px; left: 16px; z-index: 20;
            color: #a1a1a1; text-decoration: none; font-size: 13px; font-weight: 500;
        }
        #home-link:hover { color: #fafafa; }
        /* The showcase is a 1100×760 desktop app; below this it scales down too
           far to use. Swap in a short note + a link to the responsive docs. */
        #narrow { display: none; }
        @media (max-width: 760px) {
            #frame, #loader { display: none !important; }
            /* Fixed + inset:0 so it centers in the viewport regardless of the
               winit canvas elements that share the body. */
            #narrow {
                display: flex; position: fixed; inset: 0;
                flex-direction: column; gap: 16px;
                align-items: center; justify-content: center;
                padding: 0 28px; text-align: center; box-sizing: border-box;
            }
            #narrow .t { font-size: 17px; font-weight: 600; }
            #narrow .d { font-size: 14px; color: #a1a1a1; line-height: 1.5; max-width: 300px; }
            #narrow a {
                display: inline-flex; align-items: center; justify-content: center;
                height: 44px; padding: 0 20px; border-radius: 10px;
                background: #fafafa; color: #0a0a0a; font-size: 14px; font-weight: 600;
                text-decoration: none;
            }
        }
    </style>
</head>
<body>
    <a id="home-link" href="./">← slintcn</a>
    <!-- Slint's winit backend (wasm) renders into the canvas with this id;
         the #frame wrapper caps + centers the window. -->
    <div id="frame"><canvas id="canvas"></canvas></div>

    <div id="narrow">
        <div class="t">Best on a wider screen</div>
        <div class="d">The interactive playground is a desktop-sized Slint app. Open it on a laptop, or browse the components in the docs.</div>
        <a href="./docs/">Browse the docs →</a>
    </div>

    <div id="loader">
        <div class="brand">slintcn</div>
        <div class="spinner"></div>
        <div class="label">Compiling Slint WebAssembly bundle (~7 MB)…</div>
    </div>

    <script type="module">
        // Cache-bust: bump ?v= on each deploy so browsers fetch the fresh bundle.
        import init from './pkg/slintcn-showcase.js?v=0.25.0';

        // Fill the viewport, but freeze the canvas box during a drag: set it in
        // px and only re-fit 200ms after the resize settles. Continuous box
        // changes make Slint reallocate its WebGL surface every frame, which
        // blanks/flickers the canvas on Safari + Firefox.
        const frame = document.getElementById('frame');
        const fit = () => {
            frame.style.width = window.innerWidth + 'px';
            frame.style.height = window.innerHeight + 'px';
        };
        fit();
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(fit, 200);
        });

        function reveal() {
            document.getElementById('loader').classList.add('hidden');
            // Focus the canvas so the FIRST click reaches Slint. On Firefox an
            // unfocused canvas spends the first click on focusing itself.
            const c = document.getElementById('canvas');
            if (c) { c.setAttribute('tabindex', '0'); c.focus(); }
        }

        function isWinitControlFlow(err) {
            // winit hands control to the browser from EventLoop::run() by THROWING
            // a JS exception that unwinds the Rust stack — not a failure.
            const msg = (err && (err.message || err.toString())) || '';
            return msg.includes('control flow') || msg.includes("isn't actually an error");
        }

        // The showcase is a desktop-sized Slint app. On narrow screens we show a
        // note + docs link instead (see the media query), and skip the 7 MB WASM
        // download entirely — also keeps the winit canvas from interfering with
        // the centered note's layout.
        if (window.matchMedia("(min-width: 761px)").matches) {
            init({ module_or_path: './pkg/slintcn-showcase_bg.wasm?v=0.25.0' })
                .then(reveal)
                .catch((err) => {
                    if (isWinitControlFlow(err)) { reveal(); return; }
                    const loader = document.getElementById('loader');
                    loader.innerHTML = `
                        <div class="brand">slintcn</div>
                        <div class="err">Failed to load WebAssembly bundle.\n${(err && err.stack) || err}</div>
                    `;
                    console.error('slintcn init failed:', err);
                });
        }
    </script>
</body>
</html>
